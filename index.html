<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krish Pandya | Resume</title>
    <link rel="icon" type="image/jpeg" href="avatar.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #0f172a;
            --primary-hover: #1e293b;
            --secondary: #e2e8f0;
            --secondary-hover: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .avatar {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 1.5rem auto;
            border: 2px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .subtitle {
            margin: 0.35rem 0 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .note {
            background-color: #f8fafc;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
            display: inline-block;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            padding: 0.875rem 1.5rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(0, 0, 0, 0.15);
        }

        .btn-secondary {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--secondary);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-hover);
        }

        .last-updated {
            font-size: 0.75rem;
            color: #94a3b8;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="avatar.jpg" alt="Krish Pandya" class="avatar">
        <h1>Krish Pandya</h1>
        <div class="subtitle">Professional Resume</div>
        
        <div class="note">
            Here you can find the most up-to-date version of my resume.
        </div>

        <div class="actions">
            <a href="resume.pdf" class="btn btn-primary" target="_blank" rel="noopener noreferrer">View Resume</a>
            <a href="resume.pdf" class="btn btn-secondary" download>Download PDF</a>
        </div>

        <p class="last-updated">Last updated: May 2026</p>
    </div>
</body>
</html>
